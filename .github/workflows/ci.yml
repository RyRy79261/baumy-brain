name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest # Docker is available → the real-Postgres e2e runs here too
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint # eslint 9 flat config (eslint.config.mjs)
      - run: pnpm typecheck
      - run: pnpm test # unit (PGlite) + e2e (real pgvector Postgres via testcontainers)
      - run: pnpm build
